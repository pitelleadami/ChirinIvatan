    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7faf3;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        color: #122312;
        padding: 24px;
      }
      .gate {
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        margin: 0 auto 20px;
        display: block;
        opacity: 0.82;
      }
      .wordmark {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #1f5f28;
        margin-bottom: 6px;
      }
      .tagline {
        font-size: 12px;
        color: #596553;
        margin-bottom: 32px;
      }
      .card {
        background: #fff;
        border: 1px solid #d2dcc8;
        border-radius: 14px;
        padding: 28px 24px 24px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #596553;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 8px;
        text-align: left;
      }
      input[type='password'] {
        width: 100%;
        height: 44px;
        border: 1px solid #d2dcc8;
        border-radius: 8px;
        padding: 0 14px;
        font-size: 16px;
        color: #122312;
        background: #fff;
        outline: none;
        transition: border-color 0.15s;
        margin-bottom: 14px;
      }
      input[type='password']:focus {
        border-color: #1f5f28;
      }
      button {
        width: 100%;
        height: 44px;
        background: #1f5f28;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #184b20;
      }
      button:disabled {
        background: #a3c4a8;
        cursor: default;
      }
      .error {
        margin-top: 12px;
        font-size: 13px;
        color: #9a2d2d;
        min-height: 18px;
      }
      .footer {
        margin-top: 28px;
        font-size: 11px;
        color: #596553;
        opacity: 0.6;
      }
    </style>

      <p class="wordmark">Chirin Ivatan</p>
      <p class="tagline">Private Beta — access by invitation only</p>

      <div class="card">
        <label for="pw">Access password</label>
        <input
          type="password"
          id="pw"
          autocomplete="current-password"
          autofocus
          placeholder="Enter password"
        />
        <button type="button" id="btn" onclick="doLogin()">Enter</button>
        <p class="error" id="err"></p>
      </div>

      <p class="footer">Ivatan Cultural Digital Archive &nbsp;·&nbsp; chirinivatan.com</p>
    </div>

    <script>
      const input = document.getElementById('pw')
      const btn = document.getElementById('btn')
      const err = document.getElementById('err')

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') doLogin()
      })

      async function doLogin() {
        const password = input.value.trim()
        if (!password) return
        btn.disabled = true
        err.textContent = ''
        try {
          const res = await fetch('/api/beta/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
            credentials: 'same-origin',
          })
          if (res.ok) {
            const next = new URLSearchParams(window.location.search).get('next') || '/'
            window.location.href = next
          } else {
            err.textContent = 'Wrong password. Try again.'
            input.select()
            btn.disabled = false
          }
        } catch (e) {
          err.textContent = 'Network error. Please try again.'
          btn.disabled = false
        }
      }
    </script>
