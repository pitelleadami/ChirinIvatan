<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password | Chirin Ivatan</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: #1f2a1d;
        background: #f4f0df;
      }
      main {
        width: min(100% - 32px, 560px);
        margin: 72px auto;
        border: 1px solid rgba(31, 42, 29, 0.14);
        border-radius: 12px;
        padding: 28px;
        background: rgba(255, 254, 248, 0.9);
        box-shadow: 0 20px 52px rgba(31, 42, 29, 0.12);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1;
      }
      p {
        line-height: 1.55;
      }
      form {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 700;
      }
      input {
        min-height: 42px;
        border: 1px solid rgba(31, 42, 29, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
      }
      button {
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: #2f6a32;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      .errorlist {
        margin: 0;
        padding-left: 18px;
        color: #8d2525;
      }
    </style>
  </head>
  <body>
    <main>
      {% if validlink %}
        <h1>Reset your password</h1>
        <p>Choose a new password for your Chirin Ivatan account.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <label>
            New password
            {{ form.new_password1 }}
            {{ form.new_password1.errors }}
          </label>
          <label>
            Confirm new password
            {{ form.new_password2 }}
            {{ form.new_password2.errors }}
          </label>
          <button type="submit">Save New Password</button>
        </form>
      {% else %}
        <h1>Reset link expired</h1>
        <p>This password reset link is invalid or has already been used. Ask an administrator to send a new reset link.</p>
      {% endif %}
    </main>
  </body>
</html>
