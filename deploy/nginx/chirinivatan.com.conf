server {
    listen 80;
    listen [::]:80;
    server_name chirinivatan.com www.chirinivatan.com;

    client_max_body_size 25M;

    root /var/www/chirin/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /var/www/chirin/media/;
    }

    location /static/ {
        alias /var/www/chirin/static/;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.chirinivatan.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /var/www/chirin/media/;
    }

    location /static/ {
        alias /var/www/chirin/static/;
    }
}

# After HTTP works:
# certbot --nginx -d chirinivatan.com -d www.chirinivatan.com
# certbot --nginx -d api.chirinivatan.com
