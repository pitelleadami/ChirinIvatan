name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_DEBUG: 'False'
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_DB_ENGINE: django.db.backends.sqlite3
      DJANGO_DB_NAME: db.sqlite3
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r ../requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run backend tests
        run: python manage.py test users reviews dictionary folklore

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      DJANGO_DEBUG: 'True'
      DJANGO_SECRET_KEY: ci-e2e-secret-key-not-for-production
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DJANGO_DB_ENGINE: django.db.backends.sqlite3
      DJANGO_DB_NAME: db.sqlite3
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      E2E_PYTHON: python
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r ../requirements.txt

      - name: Prepare local SQLite database
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/.report/
          if-no-files-found: ignore

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          if-no-files-found: ignore
