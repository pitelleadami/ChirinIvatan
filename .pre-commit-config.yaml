minimum_pre_commit_version: '4.0.0'

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python3 -m ruff check --fix
        language: system
        types: [python]
        exclude: /migrations/

      - id: black
        name: black
        entry: python3 -m black
        language: system
        types: [python]
        exclude: /migrations/

      - id: prettier
        name: prettier
        entry: frontend/node_modules/.bin/prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, css, json, markdown, html, yaml]
        exclude: ^(frontend/dist/|frontend/node_modules/|frontend/package-lock\.json|docs/IS295A_FROZEN/|manuscript/)

      - id: frontend-eslint
        name: frontend eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|jsx)$
